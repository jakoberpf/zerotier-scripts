name: test

on: 
  - push
  - pull_request

jobs:
  action:
    runs-on: ubuntu-latest
    steps:
      # Setup BATS and VAULT CLI
      - uses: KengoTODA/actions-setup-docker-compose@main
        with:
          version: '1.29.2'
      # Checkout Code
      - name: Checkout
        uses: actions/checkout@v2
      # Run Tests
      - name: Start testing backend
        run: cd test && docker-compose up -d
      - name: Verify testing backend
        run: sudo cat ./test/data/controller/authtoken.secret
      - name: Get controller api token
        run: echo "ZT_TOKEN=$(cat ./test/data/controller/authtoken.secret)" >> $GITHUB_ENV && echo "$GITHUB_ENV"
      - name: Get controller node id
        run: echo "ZT_TOKEN=$(cat ./test/data/controller/authtoken.secret)" >> $GITHUB_ENV && echo "$GITHUB_ENV"
      - name: Create new network
        run: echo "ZT_TOKEN=$(cat ./test/data/controller/authtoken.secret)" >> $GITHUB_ENV && echo "$GITHUB_ENV"

        curl -X POST "http://localhost:9993/controller/network/${NODEID}______" -H "X-ZT1-AUTH: ${TOKEN}" -d {}
